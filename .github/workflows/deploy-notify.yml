name: Deploy & Notify Lark

on:
  push:
    branches: [main]
    tags:
      - "*"

jobs:
  deploy-staging:
    name: Deploy to Staging
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Simulate staging deploy
        run: |
          echo "Building Docker image..."
          docker build -t cicd-test-app:staging .
          echo "Staging deploy complete."

      - name: Notify Lark - Staging Success
        if: success()
        env:
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          printf '{"msg_type":"interactive","card":{"header":{"title":{"tag":"plain_text","content":"✅ Staging Deploy Succeeded"},"template":"green"},"elements":[{"tag":"div","text":{"tag":"lark_md","content":"**Repo:** %s\\n**Branch:** %s\\n**Commit:** %s\\n**By:** %s"}}]}}' \
            "$REPO" "$BRANCH" "$SHA" "$ACTOR" > /tmp/lark.json
          curl -s -X POST "${LARK_WEBHOOK_URL}" -H "Content-Type: application/json" -d @/tmp/lark.json

      - name: Notify Lark - Staging Failed
        if: failure()
        env:
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          printf '{"msg_type":"interactive","card":{"header":{"title":{"tag":"plain_text","content":"❌ Staging Deploy FAILED"},"template":"red"},"elements":[{"tag":"div","text":{"tag":"lark_md","content":"**Repo:** %s\\n**Branch:** %s\\n**Commit:** %s\\n**By:** %s"}}]}}' \
            "$REPO" "$BRANCH" "$SHA" "$ACTOR" > /tmp/lark.json
          curl -s -X POST "${LARK_WEBHOOK_URL}" -H "Content-Type: application/json" -d @/tmp/lark.json

  deploy-production:
    name: Deploy to Production (Tag)
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Simulate production deploy
        run: |
          echo "Deploying tag ${{ github.ref_name }} to production..."
          docker build -t cicd-test-app:${{ github.ref_name }} .
          echo "Production deploy complete."

      - name: Notify Lark - Production Success
        if: success()
        env:
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          printf '{"msg_type":"interactive","card":{"header":{"title":{"tag":"plain_text","content":"🚀 Production Deploy Succeeded"},"template":"blue"},"elements":[{"tag":"div","text":{"tag":"lark_md","content":"**Repo:** %s\\n**Tag:** %s\\n**Commit:** %s\\n**By:** %s"}}]}}' \
            "$REPO" "$TAG" "$SHA" "$ACTOR" > /tmp/lark.json
          curl -s -X POST "${LARK_WEBHOOK_URL}" -H "Content-Type: application/json" -d @/tmp/lark.json
