name: Deploy & Notify Lark

on:
  push:
    branches: [main]
    tags:
      - "*"

jobs:
  deploy-staging:
    name: Deploy to Staging
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Simulate staging deploy
        run: |
          echo "Building Docker image..."
          docker build -t cicd-test-app:staging .
          echo "Staging deploy complete."

      - name: Notify Lark - Staging
        if: always()
        env:
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          DEPLOY_STATUS: ${{ job.status }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "=== Debug: URL length ==="
          echo "${LARK_WEBHOOK_URL}" | wc -c
          echo "=== Debug: URL first 10 chars ==="
          echo "${LARK_WEBHOOK_URL}" | cut -c1-10
          echo "=== Sending notification ==="
          curl -v -X POST "${LARK_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d '{"msg_type":"text","content":{"text":"deploy test"}}' \
            2>&1 || true
          echo "=== curl exit code: $? ==="

  deploy-production:
    name: Deploy to Production (Tag)
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Simulate production deploy
        run: |
          echo "Deploying tag ${{ github.ref_name }} to production..."
          docker build -t cicd-test-app:${{ github.ref_name }} .
          echo "Production deploy complete."

      - name: Notify Lark - Production
        if: always()
        env:
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
        run: |
          curl -v -X POST "${LARK_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d '{"msg_type":"text","content":{"text":"production deploy test"}}' \
            2>&1 || true
