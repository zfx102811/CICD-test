name: Deploy & Notify Lark

on:
  push:
    branches: [main]
    tags:
      - "*"

jobs:
  deploy-staging:
    name: Deploy to Staging
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Simulate staging deploy
        run: |
          echo "Building Docker image..."
          docker build -t cicd-test-app:staging .
          echo "Staging deploy complete."

      - name: Notify Lark - Staging
        if: success()
        env:
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          DEPLOY_INFO: "Staging deploy succeeded | repo=${{ github.repository }} branch=${{ github.ref_name }} commit=${{ github.sha }} by=${{ github.actor }}"
        run: |
          curl -s -X POST "${LARK_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d '{"msg_type":"text","content":{"text":"'"${DEPLOY_INFO}"'"}}'

      - name: Notify Lark - Staging Failed
        if: failure()
        env:
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          DEPLOY_INFO: "Staging deploy FAILED | repo=${{ github.repository }} branch=${{ github.ref_name }} commit=${{ github.sha }} by=${{ github.actor }}"
        run: |
          curl -s -X POST "${LARK_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d '{"msg_type":"text","content":{"text":"'"${DEPLOY_INFO}"'"}}'

  deploy-production:
    name: Deploy to Production (Tag)
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Simulate production deploy
        run: |
          echo "Deploying tag ${{ github.ref_name }} to production..."
          docker build -t cicd-test-app:${{ github.ref_name }} .
          echo "Production deploy complete."

      - name: Notify Lark - Production
        if: success()
        env:
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          DEPLOY_INFO: "Production deploy succeeded | tag=${{ github.ref_name }} repo=${{ github.repository }} commit=${{ github.sha }} by=${{ github.actor }}"
        run: |
          curl -s -X POST "${LARK_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d '{"msg_type":"text","content":{"text":"'"${DEPLOY_INFO}"'"}}'
